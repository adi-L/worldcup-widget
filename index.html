<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Widget · demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 600px at 50% -10%, #1a2540, #070b14);
        font-family: system-ui, sans-serif;
      }
      .wrap {
        text-align: center;
      }
      h1 {
        color: #f4f7fb;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 24px;
        opacity: 0.8;
      }
    </style>
    <!-- The component (ES module, pulls Lit from a CDN) -->
    <script type="module" src="./worldcup-widget.js"></script>
  </head>
  <body>
    <div class="wrap">
      <h1>⚽ Embeddable World Cup Widget</h1>
      <worldcup-widget league="4429" interval="60"></worldcup-widget>
    </div>
  </body>
</html>
